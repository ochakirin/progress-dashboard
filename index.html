<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大会ラップタイム・進捗ダッシュボード</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    <style>
      .timeline { position: relative; padding-left: 50px; list-style: none; }
      .timeline::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 4px; background: #dee2e6; }
      .timeline-item { position: relative; margin-bottom: 40px; }
      .timeline-marker { position: absolute; left: -36px; top: 5px; width: 16px; height: 16px; border-radius: 50px; background: #dee2e6; border: 2px solid #fff; box-shadow: 0 0 0 1px #dee2e6;}
      .status-done .timeline-marker { background: #198754; box-shadow: 0 0 0 2px #198754;}
      .status-current .timeline-marker { background: #0d6efd; box-shadow: 0 0 0 3px #0d6efd; animation: pulse 1.5s infinite; }
      
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(13, 110, 253, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(13, 110, 253, 0); }
        100% { box-shadow: 0 0 0 0 rgba(13, 110, 253, 0); }
      }

      .character-container { position: absolute; left: -90px; top: -15px; width: 50px; height: 50px; text-align: center; }
      .character-gif { width: 100%; height: auto; animation: bounce 0.6s infinite alternate ease-in-out; }
      @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }
      
      .graph-instruction { font-size: 0.85rem; color: #6c757d; }
    </style>
  </head>
  <body class="bg-light p-4">
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 1000px;">
      <h2 class="mb-4 text-center">🏁 レース状況ダッシュボード</h2>
      
      <div class="mb-5 position-relative">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-2 flex-wrap">
          <h5 class="mb-0">レース全体の推移</h5>
          
          <div class="mt-2 mt-md-0 d-flex align-items-center flex-wrap gap-2">
            <div class="btn-group me-2" role="group">
              <input type="radio" class="btn-check" name="chartMode" id="modeTime" value="time" autocomplete="off" checked>
              <label class="btn btn-sm btn-outline-primary fw-bold" for="modeTime">⏱ タイム推移</label>
              <input type="radio" class="btn-check" name="chartMode" id="modeRank" value="rank" autocomplete="off">
              <label class="btn btn-sm btn-outline-primary fw-bold" for="modeRank">🏆 順位変動</label>
            </div>

            <div class="btn-group me-2">
              <button id="zoomInYBtn" class="btn btn-sm btn-outline-secondary">縦軸 ＋</button>
              <button id="zoomOutYBtn" class="btn btn-sm btn-outline-secondary">縦軸 －</button>
            </div>
            <button id="resetZoomBtn" class="btn btn-sm btn-outline-secondary">リセット</button>
          </div>
        </div>
        <canvas id="timeChart" height="140"></canvas>
      </div>

      <div class="row g-4">
        <div class="col-md-6">
          <div class="p-3 bg-light rounded border h-100">
            <h5 class="mb-3 border-bottom pb-2">単一チームの現在地</h5>
            <select id="teamSelector" class="form-select mb-4 fw-bold">
              <option value="" disabled selected>読み込み中...</option>
            </select>
            <ul class="timeline mt-4" id="timelineContainer">
              <p id="loadingText" class="text-muted">データを読み込み中...</p>
            </ul>
          </div>
        </div>

        <div class="col-md-6">
          <div class="p-3 bg-light rounded border h-100">
            <h5 class="mb-3 border-bottom pb-2">2チーム間のタイム差比較</h5>
            <div class="row g-2 mb-4">
              <div class="col">
                <label class="small text-muted fw-bold">基準チーム 1</label>
                <select id="compareSelector1" class="form-select fw-bold border-primary"></select>
              </div>
              <div class="col">
                <label class="small text-muted fw-bold">比較チーム 2</label>
                <select id="compareSelector2" class="form-select fw-bold border-success"></select>
              </div>
            </div>
            
            <div class="table-responsive">
              <table class="table table-sm table-hover bg-white rounded shadow-sm overflow-hidden text-center small">
                <thead class="table-dark">
                  <tr>
                    <th>ラップ名</th>
                    <th>チーム1</th>
                    <th>チーム2</th>
                    <th>タイム差</th>
                  </tr>
                </thead>
                <tbody id="comparisonTableBody">
                  <tr>
                    <td colspan="4" class="text-muted">チームを選択してください</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const gasWebAppUrl = "https://script.google.com/macros/s/AKfycby1KWyNyHrp7gZV2_D3XP7Xlo0txsvySQ6iLSQO_tLVSH3YgkB_ncBuaY_1B6lA41Fu/exec?action=get_progress";
      
      let globalData = null; 
      let myChart = null;
      let currentChartMode = 'time'; // 現在のグラフモード（time または rank）

      function parseTimeToSeconds(timeStr) {
        if (!timeStr) return null;
        if (!isNaN(timeStr)) return Number(timeStr);
        const parts = timeStr.toString().split(':').map(Number);
        if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2]; 
        if (parts.length === 2) return parts[0] * 60 + parts[1]; 
        if (parts.length === 1) return parts[0];
        return null;
      }

      function formatSecondsToTime(seconds) {
        if (seconds === null || isNaN(seconds) || seconds < 0) return '--:--:--';
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      }

      function formatDiffTime(diffSeconds) {
        if (diffSeconds === null || isNaN(diffSeconds)) return '--';
        if (diffSeconds === 0) return '±00:00';
        const isNegative = diffSeconds < 0;
        const absSeconds = Math.abs(diffSeconds);
        const m = Math.floor(absSeconds / 60);
        const s = Math.floor(absSeconds % 60);
        return `${isNegative ? '-' : '+'}${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      }

      function getTeamColor(index, total) {
        return `hsl(${(index * 360) / total}, 70%, 50%)`;
      }

      fetch(gasWebAppUrl)
        .then(response => response.json())
        .then(data => {
          document.getElementById('loadingText')?.remove();
          if (!data || !data.teams || data.teams.length === 0) {
            document.getElementById('timelineContainer').innerHTML = `<p class="text-danger">データが見つかりません。</p>`;
            return;
          }

          globalData = data;

          // ★ 各ラップごとの順位を計算してチームデータに格納
          const numTeams = globalData.teams.length;
          const numLaps = globalData.laps.length;
          
          globalData.teams.forEach(team => {
            team.ranks = Array(numLaps).fill(null);
          });

          for (let lapIdx = 0; lapIdx < numLaps; lapIdx++) {
            let lapData = [];
            for (let teamIdx = 0; teamIdx < numTeams; teamIdx++) {
              let seconds = parseTimeToSeconds(globalData.teams[teamIdx].times[lapIdx]);
              if (seconds !== null) {
                lapData.push({ teamIdx: teamIdx, seconds: seconds });
              }
            }
            
            // タイム順（昇順）に並び替え
            lapData.sort((a, b) => a.seconds - b.seconds);
            
            // 順位付け（同タイムの場合は同順位）
            let currentRank = 1;
            for (let i = 0; i < lapData.length; i++) {
              if (i > 0 && lapData[i].seconds > lapData[i - 1].seconds) {
                currentRank = i + 1;
              }
              globalData.teams[lapData[i].teamIdx].ranks[lapIdx] = currentRank;
            }
          }

          // --- グラフの初期描画（タイム推移） ---
          const ctx = document.getElementById('timeChart').getContext('2d');
          const datasets = data.teams.map((team, index) => {
            return {
              label: team.name,
              data: team.times.map(t => parseTimeToSeconds(t)),
              borderColor: getTeamColor(index, data.teams.length),
              backgroundColor: 'transparent',
              tension: 0.1,
              spanGaps: true,
              borderWidth: 2
            };
          });

          myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: data.laps, datasets: datasets },
            options: {
              responsive: true,
              plugins: { 
                legend: { position: 'top', labels: { boxWidth: 12 } },
                zoom: { zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'xy' }, pan: { enabled: true, mode: 'xy' } },
                tooltip: {
                  callbacks: {
                    label: function(context) {
                      let label = context.dataset.label || '';
                      if (label) label += ': ';
                      if (context.parsed.y !== null) {
                        label += (currentChartMode === 'time') ? formatSecondsToTime(context.parsed.y) : context.parsed.y + '位';
                      }
                      return label;
                    }
                  }
                }
              },
              scales: { 
                y: { 
                  ticks: {
                    callback: function(value) { return formatSecondsToTime(value); }
                  },
                  title: { display: true, text: '経過時間 (hh:mm:ss)' },
                  reverse: false // タイムの場合は通常
                } 
              }
            }
          });

          // ★ グラフのモード切り替えイベント
          document.querySelectorAll('input[name="chartMode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
              currentChartMode = e.target.value;
              
              if (currentChartMode === 'time') {
                // タイム推移モードに設定
                myChart.data.datasets.forEach((dataset, i) => {
                  dataset.data = globalData.teams[i].times.map(t => parseTimeToSeconds(t));
                });
                myChart.options.scales.y.reverse = false;
                myChart.options.scales.y.title.text = '経過時間 (hh:mm:ss)';
                myChart.options.scales.y.ticks.callback = function(value) { return formatSecondsToTime(value); };
              } else {
                // 順位変動モードに設定
                myChart.data.datasets.forEach((dataset, i) => {
                  dataset.data = globalData.teams[i].ranks;
                });
                myChart.options.scales.y.reverse = true; // 1位を上に
                myChart.options.scales.y.title.text = '順位';
                myChart.options.scales.y.ticks.callback = function(value) {
                  // 小数点の目盛りは表示しない
                  if (Math.floor(value) === value) return value + '位';
                };
              }
              myChart.update();
              myChart.resetZoom();
            });
          });

          // ズームボタンの制御処理
          document.getElementById('zoomInYBtn').addEventListener('click', () => {
            if (myChart) myChart.zoom({ x: 1, y: 1.3 });
          });
          document.getElementById('zoomOutYBtn').addEventListener('click', () => {
            if (myChart) myChart.zoom({ x: 1, y: 0.77 });
          });
          document.getElementById('resetZoomBtn').addEventListener('click', () => {
            if (myChart) myChart.resetZoom();
          });

          const selector = document.getElementById('teamSelector');
          const compSel1 = document.getElementById('compareSelector1');
          const compSel2 = document.getElementById('compareSelector2');
          
          selector.innerHTML = '';
          compSel1.innerHTML = '';
          compSel2.innerHTML = '';

          data.teams.forEach((team, index) => {
            const opt = document.createElement('option'); opt.value = index; opt.text = team.name;
            selector.appendChild(opt.cloneNode(true));
            compSel1.appendChild(opt.cloneNode(true));
            
            const opt2 = opt.cloneNode(true);
            if (index === 1 && data.teams.length > 1) opt2.selected = true;
            compSel2.appendChild(opt2);
          });

          selector.addEventListener('change', (e) => renderTimeline(data.teams[e.target.value]));
          compSel1.addEventListener('change', updateComparison);
          compSel2.addEventListener('change', updateComparison);

          renderTimeline(data.teams[0]);
          updateComparison();
        })
        .catch(error => {
          document.getElementById('timelineContainer').innerHTML = `<p class="text-danger">データの取得に失敗しました。</p>`;
          console.error(error);
        });

      function renderTimeline(team) {
        const container = document.getElementById('timelineContainer');
        container.innerHTML = '';

        let latestRecordIndex = -1;
        team.times.forEach((time, idx) => {
          if (time !== "") latestRecordIndex = idx;
        });

        globalData.laps.forEach((lapName, index) => {
          const li = document.createElement('li');
          li.className = 'timeline-item';
          const recordedTime = team.times[index];

          let statusText = "未通過";
          let badgeClass = "bg-secondary";
          
          if (recordedTime !== "") {
            statusText = "通過済";
            badgeClass = "bg-success";
            li.classList.add('status-done');
          }

          let charHtml = '';
          if (index === latestRecordIndex) {
            li.classList.add('status-current');
            statusText = "現在地";
            badgeClass = "bg-primary";
            charHtml = `
              <div class="character-container">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3BwZ3g0Z3RndmpxbWN0bXN6dW9pZHJ4b3Y4bTh3bXF4bnA0eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3orif68v7GgIEzAnf2/giphy.gif" class="character-gif" alt="chara">
              </div>`;
          }

          li.innerHTML = `
            ${charHtml}
            <div class="timeline-marker"></div>
            <div class="ms-3">
              <h6 class="mb-1">${lapName}</h6>
              <p class="text-muted small mb-0">
                タイム: <strong>${recordedTime !== "" ? recordedTime : "--:--:--"}</strong> <span class="badge ${badgeClass} ms-2">${statusText}</span>
              </p>
            </div>
          `;
          container.appendChild(li);
        });
      }

      function updateComparison() {
        if (!globalData) return;
        const idx1 = document.getElementById('compareSelector1').value;
        const idx2 = document.getElementById('compareSelector2').value;
        
        const team1 = globalData.teams[idx1];
        const team2 = globalData.teams[idx2];
        
        const tbody = document.getElementById('comparisonTableBody');
        tbody.innerHTML = '';

        globalData.laps.forEach((lapName, index) => {
          const t1Str = team1.times[index];
          const t2Str = team2.times[index];
          
          const s1 = parseTimeToSeconds(t1Str);
          const s2 = parseTimeToSeconds(t2Str);

          let diffText = '--';
          let rowClass = '';

          if (s1 !== null && s2 !== null) {
            const diff = s2 - s1; 
            diffText = formatDiffTime(diff);
            if (diff < 0) {
              rowClass = 'table-success-light'; 
            }
          }

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="fw-bold">${lapName}</td>
            <td>${t1Str !== "" ? t1Str : '--:--'}</td>
            <td>${t2Str !== "" ? t2Str : '--:--'}</td>
            <td class="fw-bold ${diffText.startsWith('-') ? 'text-success' : diffText.startsWith('+') ? 'text-danger' : ''}">${diffText}</td>
          `;
          tbody.appendChild(tr);
        });
      }
    </script>
  </body>
</html>
